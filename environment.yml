name: snn
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - ipykernel
  - jupyter
  - numpy
  - scipy
  - sympy
  - pandas
  - scikit-learn
  - matplotlib
  - tqdm
  - pip:
      # Linux/NVIDIA GPU setup.
      # TensorFlow installs its CUDA dependencies via the and-cuda extra on Linux.
      # PyTorch CUDA wheels may need to be selected from the official PyTorch
      # install selector if the target machine uses a different CUDA setup.
      - "tensorflow[and-cuda]==2.21.0; platform_system == 'Linux' and platform_machine == 'x86_64'"
      - "tensorflow==2.21.0; platform_system != 'Linux' or platform_machine != 'x86_64'"
      - torch==2.11.0
      - torchvision==0.26.0
